name: Check Tahoe Waves
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Updated from v2
      - name: Set up Python
        uses: actions/setup-python@v5  # Updated from v2
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python monitor.py  # <-- MAKE SURE THIS MATCHES YOUR FILENAME
        
